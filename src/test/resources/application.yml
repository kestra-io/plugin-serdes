kestra:
  repository:
    type: memory
  queue:
    type: memory
  storage:
    type: local
    local:
      base-path: /tmp/unittest
  # Required by @KestraTest(startRunner = true) since Kestra 2.0: the embedded worker connects
  # to a worker-controller over gRPC, even for single-JVM tests.
  controller:
    port: ${random.port}
  worker:
    controllers:
      type: STATIC
      static:
        endpoints:
          - host: localhost
            port: ${kestra.controller.port}

grpc:
  server:
    enabled: false
    health:
      enabled: false

# The worker-controller's internal state store always needs a JDBC datasource, independent of
# the "kestra.queue.type: memory" setting used for the main execution queue above.
datasources:
  h2:
    url: jdbc:h2:mem:public;TIME ZONE=UTC;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driverClassName: org.h2.Driver
